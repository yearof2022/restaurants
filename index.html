<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restaurant Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Restaurant Map</h1>

    <div class="filters">
      <input id="f-search" type="search" placeholder="Search name or notes…" />

      <select id="f-city" multiple size="1" data-placeholder="City"></select>
      <select id="f-cuisine" multiple size="1" data-placeholder="Cuisine"></select>

      <select id="f-price">
        <option value="">Any price</option>
        <option value="$">$</option>
        <option value="$$">$$ or under</option>
        <option value="$$$">$$$ or under</option>
        <option value="$$$$">$$$$ or under</option>
      </select>

      <select id="f-rating">
        <option value="0">Any rating</option>
        <option value="3">3+ stars</option>
        <option value="4">4+ stars</option>
        <option value="5">5 stars</option>
      </select>

      <select id="f-visited">
        <option value="">Visited: All</option>
        <option value="Yes">Visited only</option>
        <option value="No">Wishlist only</option>
      </select>

      <button id="f-reset" type="button">Reset</button>
      <span id="count" class="count"></span>
    </div>
  </header>

  <main>
    <div id="map"></div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
